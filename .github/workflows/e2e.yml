# Run WebdriverIO E2E against built dist/; upload reports so you can inspect results from the Actions UI.

name: E2E tests

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      # Required: without this, `ui5` / `wdio` from devDependencies are missing (exit 127).
      - name: Install dependencies
        run: npm ci

      - name: Build, serve dist, run E2E
        run: npm run ci:test:e2e

      - name: Upload E2E report files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            reports/e2e-summary.txt
            reports/junit/
            reports/json/
          if-no-files-found: warn
